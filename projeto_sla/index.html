<body>
    <div class="roxo">
        <h1>✨ Margin e Padding — Estilo Criadora</h1></div>
        <div class="fundo">
            <h3 class="texto">💄 Padding: 30px — espaço interno</h3>
            <h3 class="texto">O bloco lílas cresceu para dentro.</h3>
        </div>

        <div class="fundo2">
            <h3 class="texto">📱 Margin: 30px — espaço externo</h3>

        </div>
        <div class="fundo3">
            <h3 class="texto">🌟 Margin: 20px + Padding: 20px.</h3>
            <h3 class="texto">Margin afasta por fora. Padding cresce por dentro.</h3>
        </div>
